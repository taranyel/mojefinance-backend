server:
  port: 8081
  servlet:
    context-path: /mojefinance/api

spring:
  config:
    import:
      - classpath:client-registration.yaml
      - classpath:external-api-specification.yaml

  data:
    redis:
      host: ${redis-host}
      port: 6379

  jpa:
    show-sql: false
    generate-ddl: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
#  sql:
#    init:
#      mode: always
#      data-locations:
#        - classpath:db/scripts/data.sql

  ssl:
    bundle:
      pem:
        ceska-sporitelna-mtls:
          keystore:
            certificate: "classpath:certs/ceska-sporitelna-cert.pem"
            private-key: "classpath:certs/ceska-sporitelna-key.key"
      jks:
        kb-mtls:
          keystore:
            location: "classpath:certs/kb-certificate.pfx"
            password: ${kb-keystore-password}
            type: PKCS12
        reiffeisen-bank-mtls:
          keystore:
            location: "classpath:certs/reiffeisen-bank-certificate.p12"
            password: ${reiffeisen-bank-keystore-password}
            type: PKCS12
        csob-mtls:
          keystore:
            location: "classpath:certs/kb-certificate.pfx"
            password: ${csob-keystore-password}
            type: PKCS12

security:
  oauth2:
    encryption:
      password: ${encryption-password}
      salt: ${encryption-salt}