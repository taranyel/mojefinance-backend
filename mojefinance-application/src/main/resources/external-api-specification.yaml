external:
  api:
    ceska-sporitelna:
      base-url: https://webapi.developers.erstegroup.com/api/csas/sandbox
      token-path: /v1/sandbox-idp/token
      authorization-path: /v1/sandbox-idp/auth
      accounts-path: /v4/account-information/my/accounts
      balances-path: /v4/account-information/my/accounts/{id}/balance
      transactions-path: /v4/account-information/my/accounts/{id}/transactions
      apikey: ${ceska-sporitelna-apikey}
    kb:
      base-url: https://api.kb.cz/sandbox
      token-path: /oauth2/v1/token
      authorization-url: https://api-gateway.kb.cz/sandbox/oauth2-authorization-ui/v3
      accounts-path: /aisp/v2/my/accounts
      balances-path: /aisp/v2/my/accounts/{id}/balance
      transactions-path: /aisp/v2/my/accounts/{id}/transactions
    raiffeisen-bank:
      base-url: https://api.rb.cz/rbcz
      accounts-path: /premium/mock/accounts1
      balances-path: /premium/mock/accounts/{accountNumber}/balance
      transactions-path: premium/mock/accounts/{accountNumber}/{currencyCode}/transactions
      x-ibm-client-id: ${raiffeisen-bank-x-ibm-client-id}
    air-bank:
      base-url: https://api.airbank.cz/sandbox
      token-path: /oauth2/token
      authorization-url: http://developers.airbank.cz/sandbox/login
      accounts-path: /accountInfo/v7/my/accounts
      balances-path: /accountInfo/v7/my/accounts/{id}/balance
      transactions-path: /accountInfo/v7/my/accounts/{accountId}/transactions
    csob:
      base-url: https://api.csob.cz/api/csob
      token-path: /oauth2/v1/token
      authorization-url: https://identita.csob.cz/mep/fs/fl/oauth2/auth
      accounts-path: /psd2/v3/ais/my/accounts
      balances-path: /psd2/v3/ais/my/accounts/{id}/balance
      transactions-path: /psd2/v3/ais/my/accounts/{id}/transactions
      apikey: ${csob-apikey}
      tpp-name: ${csob-tpp-name}
    google:
        apikey: ${google-apikey}
    exchange-rates:
      base-url: https://api-gateway.kb.cz/exchange-rates/v2
      exchange-rates-path: /exchange-rates/{currency}
      apikey: ${exchange-rates-apikey}
