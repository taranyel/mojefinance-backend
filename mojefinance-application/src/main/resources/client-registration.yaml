spring:
  security:
    oauth2:
      client:
        registration:
          ceska-sporitelna:
            client-id: ${ceska-sporitelna-client-id}
            client-secret: ${ceska-sporitelna-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:5173/bank-callback
            scope: aisp
            provider: ceska-sporitelna
            client-authentication-method: client_secret_post
          csob:
            client-id: ${csob-client-id}
            client-secret: ${csob-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:5173/bank-callback
            scope: aisp
            provider: csob
          kb:
            client-id: ${kb-client-id}
            client-secret: ${kb-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:5173/bank-callback
            scope: aisp
            provider: kb
          air-bank:
            client-id: ${air-bank-client-id}
            client-secret: ${air-bank-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:5173/bank-callback
            scope: aisp
            provider: air-bank
        provider:
          ceska-sporitelna:
            token-uri: ${external.api.ceska-sporitelna.base-url}${external.api.ceska-sporitelna.token-path}
            authorization-uri: ${external.api.ceska-sporitelna.base-url}${external.api.ceska-sporitelna.authorization-path}
          kb:
            token-uri: ${external.api.kb.base-url}${external.api.kb.token-path}
            authorization-uri: ${external.api.kb.authorization-url}
          air-bank:
            token-uri: ${external.api.air-bank.base-url}${external.api.air-bank.token-path}
            authorization-uri: ${external.api.air-bank.authorization-url}
          csob:
            token-uri: ${external.api.csob.base-url}${external.api.csob.token-path}
            authorization-uri: ${external.api.csob.authorization-url}

external:
  api:
    ceska-sporitelna:
      base-url: https://webapi.developers.erstegroup.com/api/csas/sandbox
      token-path: /v1/sandbox-idp/token
      authorization-path: /v1/sandbox-idp/auth
      accounts-path: /v4/account-information/my/accounts
    kb:
      base-url: https://api.kb.cz/sandbox
      token-path: /oauth2/v1/token
      authorization-url: https://api-gateway.kb.cz/sandbox/oauth2-authorization-ui/v3
      accounts-path: /aisp/v2/my/accounts
    reiffeisen-bank:
      base-url: https://api.rb.cz/rbcz
      accounts-path: /premium/mock/accounts
    air-bank:
      base-url: https://api.airbank.cz/sandbox
      token-path: /oauth2/token
      authorization-url: http://developers.airbank.cz/sandbox/login
      accounts-path: /accountInfo/v3/my/accounts
    csob:
      base-url: https://api.csob.cz/api/csob
      token-path: /oauth2/v1/token
      authorization-url: https://identita.csob.cz/mep/fs/fl/oauth2/auth
      accounts-path: /psd2/v3/ais/my/accounts
      apikey: ${csob-apikey}